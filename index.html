<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mazda 787B - PechaKucha</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    <style>
        /* Paleta Mazda Livery */
        :root {
            --mazda-verde: #008000;
            --mazda-naranja: #ff6600;
            --mazda-blanco: #ffffff;
            --fondo: #f4f4f4;
        }

        body { margin: 0; background: var(--fondo); font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Texto a la izquierda */
        .slide { 
            width: 40%; height: 80%; background: var(--mazda-blanco); 
            margin: 50px 0 0 50px; border-left: 10px solid var(--mazda-verde);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1); border-radius: 0 15px 15px 0; 
            display: none; flex-direction: column; justify-content: center; 
            padding: 40px; position: absolute;
        }
        .slide.active { display: flex; }

        h2 { color: var(--mazda-naranja); font-size: 3.5em; margin-bottom: 20px; }
        p { font-size: 2em; color: #333; line-height: 1.4; }

        /* Modelo a 720p (1280x720) y zoom más cerca */
        .model-container { 
            position: fixed; bottom: 20px; right: 20px; 
            width: 720px; height: 405px; z-index: 10;
        }

        .controls { position: fixed; bottom: 30px; left: 50px; z-index: 100; }
        button { background: var(--mazda-verde); color: white; border: none; padding: 15px 30px; cursor: pointer; font-size: 1.2em; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="slides-container"></div>

    <div class="model-container">
        <model-viewer 
            src="Mazda_787B_v2.glb" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1" 
            camera-orbit="45deg 75deg 60%" 
            style="width:100%; height:100%;">
        </model-viewer>
    </div>

    <div class="controls">
        <button onclick="prevSlide()">ANTERIOR</button>
        <button onclick="nextSlide()">SIGUIENTE</button>
    </div>

    <script>
        const contenido = [
            "Good morning everyone: THE MAZDA 787B.",
            "In 1991, this car did the impossible: The Myth of Le Mans.",
            "The Rotary Engine: What Makes it Special.",
            "Triangles instead of pistons: Felix Wankel’s Idea.",
            "A Reuleaux triangle rotating: The Rotor.",
            "Intake, Compression, Combustion, Exhaust: The 4 Stages.",
            "Nonstop power: Continuous Cycle.",
            "Four distinct rotors: The R26B Heart.",
            "Less weight, extremely compact: No Valves.",
            "Reaching 9,000 RPMs: High RPMs.",
            "Perfectly smooth and linear: Power Delivery.",
            "Iconic high-pitched scream: Sound.",
            "Fewer moving parts: Reliability Factor.",
            "Mazda fixed the consumption: Fuel Injection.",
            "Car number 55 won: June 23, 1991.",
            "Perfect after the race: Engine Condition.",
            "Rules changed for rotary engines: The Ban.",
            "The only rotary winner: Unbeatable Legend.",
            "Being different wins: Engineering Courage.",
            "Thank you for listening!: Conclusion"
        ];

        const container = document.getElementById('slides-container');
        
        contenido.forEach((item, i) => {
            const partes = item.split(':');
            const cuerpo = partes[0];
            const titulo = partes[1] || ""; // Lo que está después de los 2 puntos
            
            container.innerHTML += `
                <div class="slide ${i === 0 ? 'active' : ''}">
                    <p>${cuerpo}</p>
                    <h2>${titulo}</h2>
                </div>`;
        });

        let index = 0;
        const slides = document.querySelectorAll('.slide');
        function update() { slides.forEach((s, i) => s.classList.toggle('active', i === index)); }
        function nextSlide() { index = (index + 1) % slides.length; update(); }
        function prevSlide() { index = (index - 1 + slides.length) % slides.length; update(); }
    </script>
</body>
</html>
