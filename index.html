<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mazda 787B - PechaKucha</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    <style>
        :root {
            --verde: #008000;
            --naranja: #ff6600;
            --blanco: #ffffff;
        }

        body { 
            margin: 0; 
            /* Fondo con degradado para que se vean los colores de la livery */
            background: linear-gradient(135deg, var(--verde) 30%, var(--blanco) 30%, var(--blanco) 70%, var(--naranja) 70%);
            font-family: 'Arial', sans-serif; 
            height: 100vh; overflow: hidden; 
        }
        
        /* El texto ahora tiene un fondo semitransparente para que no se pierda */
        .slide { 
            width: 450px; height: 100%; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 50px; position: absolute; left: 0; top: 0;
            display: none; flex-direction: column; justify-content: center;
            border-right: 5px solid var(--verde); z-index: 20;
        }
        .slide.active { display: flex; }

        h2 { color: var(--naranja); font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.5em; color: #333; }

        /* El carro ahora está detrás del texto y con menor tamaño */
        .model-container { 
            position: absolute; right: 50px; bottom: 50px;
            width: 600px; height: 350px; 
            z-index: 1; /* El texto siempre estará encima */
        }

        .controls { position: fixed; bottom: 30px; left: 500px; z-index: 100; }
        button { background: var(--verde); color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="slides-container"></div>

    <div class="model-container">
        <model-viewer 
            src="Mazda_787B.glb" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1" 
            camera-orbit="30deg 75deg 70%" 
            style="width:100%; height:100%;">
        </model-viewer>
    </div>

    <div class="controls">
        <button onclick="prevSlide()">ANTERIOR</button>
        <button onclick="nextSlide()">SIGUIENTE</button>
    </div>

    <script>
        const contenido = [
            "Good morning everyone: THE MAZDA 787B",
            "In 1991, this car did the impossible: The Myth of Le Mans",
            "What Makes it Special: The Rotary Engine",
            "Felix Wankel’s Idea: Triangles instead of pistons",
            "The Rotor: A Reuleaux triangle rotating",
            "The 4 Stages: Intake, Compression, Combustion, Exhaust",
            "Continuous Cycle: Nonstop power",
            "The R26B Heart: Four distinct rotors",
            "No Valves: Less weight, extremely compact",
            "High RPMs: Reaching 9,000 RPMs",
            "Power Delivery: Perfectly smooth and linear",
            "Sound: Iconic high-pitched scream",
            "Reliability Factor: Fewer moving parts",
            "Fuel Injection: Mazda fixed the consumption",
            "June 23, 1991: Car number 55 won",
            "Engine Condition: Perfect after the race",
            "The Ban: Rules changed for rotary engines",
            "Unbeatable Legend: The only rotary winner",
            "Engineering Courage: Being different wins",
            "Conclusion: Thank you for listening!"
        ];

        const container = document.getElementById('slides-container');
        contenido.forEach((item, i) => {
            const partes = item.split(':');
            const p = partes[0];
            const h2 = partes[1] || "";
            container.innerHTML += `<div class="slide ${i === 0 ? 'active' : ''}"><p>${p}</p><h2>${h2}</h2></div>`;
        });

        let index = 0;
        const slides = document.querySelectorAll('.slide');
        function update() { slides.forEach((s, i) => s.classList.toggle('active', i === index)); }
        function nextSlide() { index = (index + 1) % slides.length; update(); }
        function prevSlide() { index = (index - 1 + slides.length) % slides.length; update(); }
    </script>
</body>
</html>
