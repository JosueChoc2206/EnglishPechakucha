<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mazda 787B - Presentación</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Contenedor de la diapositiva */
        .slide { 
            width: 80%; height: 70%; background: white; margin: 100px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 15px; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; padding: 50px; position: absolute; left: 10%;
        }
        .slide.active { display: flex; }

        h2 { color: #008000; font-size: 3em; margin-bottom: 20px; border-bottom: 3px solid #ff6600; }
        p { font-size: 1.8em; color: #333; text-align: center; line-height: 1.5; }

        /* El modelo se queda estático en la esquina */
        .model-container { 
            position: fixed; bottom: 30px; right: 30px; 
            width: 400px; height: 400px; z-index: 10;
        }

        .controls { position: fixed; bottom: 30px; left: 30px; z-index: 100; }
        button { background: #333; color: white; border: none; padding: 15px 25px; cursor: pointer; font-size: 1.2em; border-radius: 5px; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="slides-container"></div>

    <div class="model-container">
        <model-viewer src="Mazda_787B.glb" auto-rotate camera-controls shadow-intensity="1" style="width:100%; height:100%;"></model-viewer>
    </div>

    <div class="controls">
        <button onclick="prevSlide()">ANTERIOR</button>
        <button onclick="nextSlide()">SIGUIENTE</button>
    </div>

    <script>
        const contenido = [
            "THE MAZDA 787B - Good morning everyone.",
            "The Myth of Le Mans: In 1991, this car did the impossible.",
            "What Makes it Special? The Rotary Engine.",
            "Felix Wankel’s Idea: Triangles instead of pistons.",
            "The Rotor: A Reuleaux triangle rotating.",
            "The 4 Stages: Intake, Compression, Combustion, Exhaust.",
            "Continuous Cycle: Nonstop power.",
            "The R26B Heart: Four distinct rotors.",
            "No Valves, Less Weight: Extremely compact.",
            "High RPMs: Reaching 9,000 RPMs.",
            "Linear Power Delivery: Perfectly smooth.",
            "The Screaming Sound: Iconic high-pitched scream.",
            "Reliability Factor: Fewer moving parts.",
            "Fuel Consumption: Mazda fixed this with injection.",
            "June 23, 1991: Car number 55 won.",
            "Reliability Proof: Engine was in perfect condition.",
            "The Ban: Rules changed for rotary engines.",
            "Unbeatable Legend: The only rotary winner.",
            "Engineering Courage: Being different wins.",
            "Conclusion: Thank you for listening!"
        ];

        const container = document.getElementById('slides-container');
        contenido.forEach((texto, i) => {
            container.innerHTML += `<div class="slide ${i === 0 ? 'active' : ''}"><h2>Mazda 787B</h2><p>${texto}</p></div>`;
        });

        let index = 0;
        const slides = document.querySelectorAll('.slide');

        function update() {
            slides.forEach((s, i) => s.classList.toggle('active', i === index));
        }
        function nextSlide() { index = (index + 1) % slides.length; update(); }
        function prevSlide() { index = (index - 1 + slides.length) % slides.length; update(); }
    </script>
</body>
</html>
