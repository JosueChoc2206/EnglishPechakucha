<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Presentación Mazda 787B</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Contenedor de la diapositiva */
        .slide { 
            width: 80%; height: 50%; background: white; margin: 50px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 15px; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; padding: 40px; position: absolute; left: 10%;
        }
        .slide.active { display: flex; }

        h2 { color: #008000; font-size: 3em; margin-bottom: 20px; border-bottom: 3px solid #ff6600; }
        p { font-size: 1.8em; color: #333; text-align: center; }

        /* Modelo con tamaño fijo 1280x420 */
        .model-container { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 1280px; height: 720px; z-index: 10;
            border: 2px solid #333; border-radius: 10px; background: #fff;
        }

        .controls { position: fixed; bottom: 20px; left: 20px; z-index: 100; }
        button { background: #333; color: white; border: none; padding: 15px 25px; cursor: pointer; font-size: 1.2em; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="slides-container"></div>

    <div class="model-container">
        <!-- Usa el nombre del archivo corregido (ej. Mazda_787B_v2.glb) -->
        <model-viewer src="Mazda_787B.glb" auto-rotate camera-controls shadow-intensity="1" style="width:100%; height:100%;"></model-viewer>
    </div>

    <div class="controls">
        <button onclick="prevSlide()">ANTERIOR</button>
        <button onclick="nextSlide()">SIGUIENTE</button>
    </div>

    <script>
        const contenido = [
            "THE MAZDA 787B: Good morning everyone.",
            "The Myth: In 1991, this car did the impossible.",
            "Special Feature: The Rotary Engine.",
            "Felix Wankel’s Idea: Triangles instead of pistons.",
            "The Rotor: A Reuleaux triangle rotating.",
            "The 4 Stages: Intake, Compression, Combustion, Exhaust.",
            "Continuous Cycle: Nonstop power.",
            "The R26B Heart: Four distinct rotors.",
            "No Valves: Less weight, extremely compact.",
            "High RPMs: Reaching 9,000 RPMs.",
            "Power Delivery: Perfectly smooth and linear.",
            "Sound: Iconic high-pitched scream.",
            "Reliability: Fewer moving parts.",
            "Fuel Injection: Mazda fixed the consumption.",
            "June 23, 1991: Car number 55 won.",
            "Engine Condition: Perfect after the race.",
            "The Ban: Rules changed for rotary engines.",
            "Unbeatable Legend: The only rotary winner.",
            "Engineering Courage: Being different wins.",
            "Conclusion: Thank you for listening!"
        ];

        const container = document.getElementById('slides-container');
        
        contenido.forEach((item, i) => {
            // Dividir el texto en el primer ":" encontrado
            const partes = item.split(':');
            const titulo = partes[0];
            const cuerpo = partes[1] || "";
            
            container.innerHTML += `
                <div class="slide ${i === 0 ? 'active' : ''}">
                    <h2>${titulo}</h2>
                    <p>${cuerpo}</p>
                </div>`;
        });

        let index = 0;
        const slides = document.querySelectorAll('.slide');

        function update() {
            slides.forEach((s, i) => s.classList.toggle('active', i === index));
        }
        function nextSlide() { index = (index + 1) % slides.length; update(); }
        function prevSlide() { index = (index - 1 + slides.length) % slides.length; update(); }
    </script>
</body>
</html>
